<section class="hero">
  <h1>Amy(Mengqi) Deng</h1>
  <p class="tagline">Java Full-Stack Engineer · Spring Boot · Angular</p>
  <button class="cta" (click)="resumeModalOpen.set(true)">Contact Me</button>
</section>

@if (resumeModalOpen()) {
  <app-resume-request-dialog (onClose)="resumeModalOpen.set(false)" />
}

<section class="projects">
  <h2>Projects</h2>
  <ul>
    @for (project of projects(); track project.slug) {
      <li>
        <a [routerLink]="['/projects', project.slug]">
          <h3>{{ project.title }}</h3>
          <p>{{ project.summary }}</p>
          <div class="stack">
            @for (tech of project.stack; track tech) {
              <span class="tag">{{ tech }}</span>
            }
          </div>
        </a>
      </li>
    }
  </ul>
</section>
