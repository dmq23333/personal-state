apiVersion: v1
kind: Secret
metadata:
  name: contact-mail-secret
type: Opaque
stringData:
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "587"
  SMTP_USER: your-smtp-user
  SMTP_PASS: your-smtp-password
  MAIL_FROM: noreply@your-domain.com
  MAIL_TO: your-real-inbox@your-domain.com
  ALLOWED_ORIGIN: https://your-frontend-domain.com
  # Optional tuning knobs (if omitted, deployment defaults are used):
  # RATE_LIMIT_WINDOW_MS: "600000"
  # RATE_LIMIT_MAX_PER_IP: "30"
  # RATE_LIMIT_MAX_PER_EMAIL: "8"
  # MIN_SECONDS_BETWEEN_SAME_EMAIL: "30"
