apiVersion: apps/v1
kind: Deployment
metadata:
  name: contact-mail-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contact-mail-api
  template:
    metadata:
      labels:
        app: contact-mail-api
    spec:
      containers:
        - name: contact-mail-api
          image: YOUR_REGISTRY/contact-mail-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: SERVICE_NAME
              value: contact-mail-api
            - name: SERVICE_VERSION
              value: "1.0.0"
            - name: RATE_LIMIT_WINDOW_MS
              value: "600000"
            - name: RATE_LIMIT_MAX_PER_IP
              value: "30"
            - name: RATE_LIMIT_MAX_PER_EMAIL
              value: "8"
            - name: MIN_SECONDS_BETWEEN_SAME_EMAIL
              value: "30"
          envFrom:
            - secretRef:
                name: contact-mail-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: contact-mail-api
spec:
  selector:
    app: contact-mail-api
  ports:
    - port: 80
      targetPort: 8080
